<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Etch-A-Sketch</h1>
    <div>
        <input type="range" id="slider" min="16" max="100" value="64">
        <p>Grid Size: <span id="slider-value">64</span></p>
    </div>
    <div class="content">
        <div class="buttons">
            <button id="blackBtn" class="btn" value="b;ack">Black</button>
            <button id="redBtn" class="btn" value="red">Red</button>
            <button id="greenBtn" class="btn" value="green">Green</button>
            <button id="blueBtn" class="btn" value="blue">Blue</button>
            <button id="yellowBtn" class="btn" value="yellow">Yellow</button>
            <button id="purpleBtn" class="btn" value="purple">Purple</button>
            <button id="randomBtn" class="btn" value="rainbow">Rainbow</button>
            <button id="eraser" class="btn" value="eraser">Eraser</button>
            <button id="opacity" class="btn" value="opacity">Opacity</button>
            <button id="reset" class="btn" value="reset">Reset</button>
        </div>


        <div class="container" draggable="false">
        </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
