<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Etch-A-Sketch</h1>
    <div>
        <input type="range" id="slider" min="16" max="100" value="64">
        <p>Grid Size: <span id="slider-value">64</span></p>
    </div>
    <div class="content">
        <div class="buttons">
            <button id="blackBtn">Black</button>
            <button id="redBtn">Red</button>
            <button id="greenBtn">Green</button>
            <button id="blueBtn">Blue</button>
            <button id="yellowBtn">Yellow</button>
            <button id="purpleBtn">Purple</button>
            <button id="randomBtn">Rainbow</button>
            <button id="opacity">Solid</button>
            <button id="eraser">Eraser</button>
            <button id="reset">Reset</button>
        </div>


        <div class="container" draggable="false">
        </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
